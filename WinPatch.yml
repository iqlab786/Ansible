---
- name: Windows Patch Information Report
  hosts: windows
  gather_facts: yes

  vars:
    report_path: "/reports/windows_patch_report.csv"
    email_to: "zxcvuiop2414@gmail.com"

  tasks:

    - name: Create reports directory
      file:
        path: /reports
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Create CSV header
      lineinfile:
        path: "{{ report_path }}"
        line: "Hostname,KB,Title,Categories,RebootRequired"
        create: yes
      delegate_to: localhost
      run_once: true

    - name: Search available Windows updates
      win_updates:
        state: searched
      register: update_result

    - name: Add update details to report
      lineinfile:
        path: "{{ report_path }}"
        line: >-
          {{ inventory_hostname }},
          {{ item.kb | default('N/A') }},
          "{{ item.title | regex_replace(',', ' ') }}",
          "{{ item.categories | join(';') }}",
          {{ update_result.reboot_required | default(false) }}
        create: yes

      loop: "{{ update_result.updates | default([]) }}"
      delegate_to: localhost

    - name: Set patch status
      set_fact:
        patch_status: "{{ 'SUCCESS' if update_result.failed is not defined else 'FAILED' }}"

    - name: Send email notification
      mail:
        host: smtp.gmail.com
        port: 587
        username: "zxcvuiop2414@gmail.com"
        password: "{{ gmail_app_password }}"
        to: "{{ email_to }}"
        subject: "Windows Patch Report - {{ inventory_hostname }}"
        body: |
          Patch report completed.

          Server: {{ inventory_hostname }}
          Status: {{ patch_status }}

          Report File:
          {{ report_path }}

        attach:
          - "{{ report_path }}"

        secure: starttls

      delegate_to: localhost
      ignore_errors: yes
