---
- name: Windows Patch Information Report
  hosts: windows
  gather_facts: yes

  vars:
    report_path: "/data/Ansible/semaphore/data/reports/windows_patch_report.csv"

  tasks:

    - name: Create reports directory
      file:
        path: /data/Ansible/semaphore/data/reports
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true

    - name: Create CSV report with header
      copy:
        dest: "{{ report_path }}"
        content: "Hostname,KB,Title,Categories,RebootRequired\n"
      delegate_to: localhost
      run_once: true

    - name: Search available Windows updates
      win_updates:
        state: searched
      register: update_result

    - name: Add update details to report
      lineinfile:
        path: "{{ report_path }}"
        line: >-
          {{ inventory_hostname }},
          {{ item.kb | default('N/A') }},
          "{{ item.title | regex_replace(',', ' ') }}",
          "{{ item.categories | join(';') }}",
          {{ update_result.reboot_required | default(false) }}
        create: yes

      loop: "{{ update_result.updates.values() | list }}"
      when: update_result.updates | length > 0
      delegate_to: localhost

    - name: Show report path
      debug:
        msg: "Patch report generated at {{ report_path }}"
